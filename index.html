<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lucky Numbers</title>
  <meta name="description"
    content="A simple random number generator" />
  <meta property="og:title" content="Lucky Numbers" />
  <meta property="og:description"
    content="A simple random number generator" />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" type="text/css" href="assets/css/tailwind.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <script defer src="assets/js/alpine.min.js"></script>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f0f0f" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png" />
</head>
<body x-data="easyNumbersApp()" x-cloak class="font-mono text-[13px] min-h-screen">
  <div class="max-w-lg mx-auto py-12 px-4">
    <div class="mb-8">
      <div class="flex items-center justify-between mb-1">
        <div class="flex items-center gap-2.5">
          <svg class="header-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="3" />
            <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" stroke="none" />
            <circle cx="15.5" cy="8.5" r="1.5" fill="currentColor" stroke="none" />
            <circle cx="8.5" cy="15.5" r="1.5" fill="currentColor" stroke="none" />
            <circle cx="15.5" cy="15.5" r="1.5" fill="currentColor" stroke="none" />
            <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none" />
          </svg>
          <span class="text-lg font-medium tracking-tight" x-text="t.title"></span>
        </div>
        <button @click="toggleLang()" class="btn-secondary text-[11px] px-2.5 py-1 rounded-md"
          x-text="lang === 'it' ? 'EN' : 'IT'" title="Switch language"></button>
      </div>
    </div>
    <div class="card flex flex-col gap-5 p-4">
      <label class="label" for="count" x-text="t.howManyNumbers"></label>
      <select class="field-select" id="count" x-model.number="countSelected">
        <template x-for="countOption in countOptions" :key="countOption">
          <option 
            :value="countOption"
            x-text="countOption + ' ' + (countOption === 1 ? t.number : t.numbers)">
          </option>
        </template>
      </select>
      <button class="btn-primary" @click="generate()">
        <span x-text="t.generateNumbers"></span>
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" :class="{'spin': showSpin}"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10" />
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
        </svg>
      </button>
      <div class="flex gap-2">        
        <template x-for="generatedNumber in generatedNumbers" :key="index">
          <div class="number-card rounded-lg h-20 w-20 flex justify-center items-center">
            <span class="text-2xl font-bold tracking-tight" x-text="generatedNumber"></span>
          </div>
        </template>
      </div>
    </div>
    <div class="divider pt-5 flex items-center justify-center text-[11px]">
      <span class="text-muted" style="opacity:0.7">
        <span x-text="t.madeWith"></span>
        <a href="https://claude.ai" target="_blank" rel="noopener" class="footer-link">Claude</a>
        (Anthropic)
      </span>
    </div>
  </div>
  <script src="assets/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/easy-numbers/sw.js');
    }
  </script>
</body>
</html>
